<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 챗봇 어시스턴트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    #1e2d40;
      --accent:    #00c2ff;
      --accent2:   #7b61ff;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --glow:      0 0 32px rgba(0,194,255,.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    /* ── animated grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,194,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,194,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 30s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* ── layout ── */
    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 24px;
      gap: 20px;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(17,24,39,.7);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: var(--glow);
      animation: slideDown .55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideDown {
      from { opacity:0; transform: translateY(-18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .logo-ring {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(0,194,255,.45);
      flex-shrink: 0;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 18px rgba(0,194,255,.45); }
      50%      { box-shadow: 0 0 32px rgba(0,194,255,.75); }
    }
    .logo-ring svg { width: 22px; height: 22px; fill: #fff; }

    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .header-text p {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 7px;
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--accent);
      background: rgba(0,194,255,.08);
      border: 1px solid rgba(0,194,255,.2);
      padding: 5px 12px;
      border-radius: 99px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── iframe card ── */
    .chat-card {
      background: rgba(17,24,39,.6);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
      position: relative;
      animation: fadeUp .65s .15s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(22px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* top accent line */
    .chat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% 100%;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="shell">

    <header>
      <div class="logo-ring">
        <!-- chat bubble icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 10H6V10h12v2zm0-3H6V7h12v2z"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>AI 챗봇 어시스턴트</h1>
        <p>Microsoft Copilot Studio 기반</p>
      </div>
      <div class="status-badge">
        <span class="dot"></span>온라인
      </div>
    </header>

    <div class="chat-card">
      <iframe
        src="https://copilotstudio.microsoft.com/environments/Default-62ae463a-9f12-4edf-8544-4f6ca3834524/bots/cre4a_msTLH9pv/webchat?__version__=2"
        allow="microphone"
        title="AI 챗봇 어시스턴트"
      ></iframe>
    </div>

  </div>
</body>
</html>
